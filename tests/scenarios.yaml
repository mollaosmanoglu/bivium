      min_factions: 10
      min_countries_per_step: 160
      required_faction_ids: []

  - id: eu_dissolved_2010
    desc: "Modern political fragmentation — tests post-Cold War geopolitics"
    input: "What if the European Union dissolved in 2010?"
    expected:
      min_factions: 12
      min_countries_per_step: 160
      required_faction_ids: []
