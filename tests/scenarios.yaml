alternate_history:
  - id: ottoman_never_fell
    desc: "Ottoman Empire survival — tests Middle East + Balkans coverage"
    input: "What if the Ottoman Empire never fell?"
    expected:
      min_factions: 12
      min_countries_per_step: 160
      required_faction_ids: [ottoman, british, russian]

  - id: franz_ferdinand_survived
    desc: "Single-event divergence — tests causation chains from WW1 trigger"
